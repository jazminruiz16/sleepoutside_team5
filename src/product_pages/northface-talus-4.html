<body>
  <header class="divider" id="main-header"></header>

  <main class="divider">
    <section class="product-detail">
      <h3 id="productBrand"></h3>
      <h2 id="productName" class="divider"></h2>

      <img id="productImage" class="divider" src="" alt="Product image" />

      <p id="productPrice" class="product-card__price"></p>
      <p id="productColor" class="product__color"></p>
      <p id="productDescription" class="product__description"></p>

      <div class="product-detail__add">
        <button id="addToCart" data-id="">Add to Cart</button>
      </div>
    </section>
  </main>

  <footer id="main-footer"></footer>
</body>
